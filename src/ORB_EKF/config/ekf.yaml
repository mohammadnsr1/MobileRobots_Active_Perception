ekf_filter_node:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 0.25
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.1
    print_diagnostics: true
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /robot_10/odom
    odom0_queue_size: 20
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]

    odom1: /orb_slam/vo_odom
    odom1_queue_size: 20
    odom1_nodelay: true
    odom1_differential: false
    odom1_relative: false
    odom1_pose_rejection_threshold: 5.0
    odom1_twist_rejection_threshold: 2.0
    odom1_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
